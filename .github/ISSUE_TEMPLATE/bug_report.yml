name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the details below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: When I run `ckeletin-go check`, it fails with...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run `ckeletin-go ...`
        2. Pass flag `--...`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages and stack traces if available.
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (Fedora/RHEL)
        - Linux (Arch)
        - Linux (Other)
        - Windows
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go Version
      description: Output of `go version`
      placeholder: go1.26.0 darwin/arm64
    validations:
      required: true

  - type: input
    id: ckeletin-version
    attributes:
      label: ckeletin-go Version
      description: Output of `ckeletin-go --version` or the git commit/tag
      placeholder: v0.1.0 or commit abc1234
    validations:
      required: true

  - type: input
    id: terminal
    attributes:
      label: Terminal
      description: Which terminal emulator are you using?
      placeholder: iTerm2, Alacritty, Windows Terminal, etc.
    validations:
      required: false

  - type: textarea
    id: config
    attributes:
      label: Relevant Configuration
      description: Any relevant config file contents, environment variables, or flags.
      render: yaml
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, logs, or screenshots about the problem.
    validations:
      required: false
