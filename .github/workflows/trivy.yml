name: Trivy Security Scan

# Only run on main branch pushes and weekly schedule
# PRs are covered by task check:fast (secrets scan)
# Full security scan (trivy + grype) runs on main
on:
  push:
    branches:
      - main
  schedule:
    # Run weekly on Monday at 10:00 UTC
    - cron: '0 10 * * 1'

# Default to no permissions; each job grants only what it needs
permissions: {}

jobs:
  trivy-scan:
    name: Trivy Vulnerability Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write # Required for uploading SARIF results
      actions: read # Required for trivy telemetry

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run Trivy Vulnerability Scanner in Repo Mode
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # 0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          # Scan for vulnerabilities in:
          # - Go dependencies (go.mod)
          # - Filesystem misconfigurations
          # - Secret scanning
          scanners: 'vuln,misconfig,secret'

      - name: Upload Trivy Results to GitHub Security
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-filesystem'
