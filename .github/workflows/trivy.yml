name: Trivy Security Scan

# Only run on main branch pushes and weekly schedule
# PRs are covered by task check:fast (secrets scan)
# Full security scan (trivy + grype) runs on main
on:
  push:
    branches:
      - main
  schedule:
    # Run weekly on Monday at 10:00 UTC
    - cron: '0 10 * * 1'

# Default to no permissions; each job grants only what it needs
permissions: {}

jobs:
  trivy-scan:
    name: Trivy Vulnerability Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write # Required for uploading SARIF results
      actions: read # Required for trivy telemetry

    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Run Trivy Vulnerability Scanner in Repo Mode
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # 0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          # Scan for vulnerabilities in:
          # - Go dependencies (go.mod)
          # - Filesystem misconfigurations
          # - Secret scanning
          scanners: 'vuln,misconfig,secret'

      - name: Upload Trivy Results to GitHub Security
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-filesystem'
