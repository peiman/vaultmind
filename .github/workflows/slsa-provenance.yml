name: SLSA Provenance

on:
  release:
    types: [created]

# Default to no permissions; each job grants only what it needs
permissions: {}

jobs:
  provenance:
    name: Generate Provenance Attestations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write      # To upload provenance to release
      id-token: write      # For OIDC signing
      attestations: write  # To create attestations

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          mkdir -p dist
          gh release download "$RELEASE_TAG" -D dist/

      - name: Generate attestations
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
