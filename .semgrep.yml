# Semgrep configuration for ckeletin-go
# Advanced static analysis for security and code quality
# See: https://semgrep.dev/docs/

rules:
  # === Security Rules ===

  - id: go-dangerous-exec
    patterns:
      - pattern-either:
          - pattern: exec.Command($CMD, ...)
          - pattern: exec.CommandContext($CTX, $CMD, ...)
      # Exclude hardcoded safe commands (string literals are safe)
      - pattern-not: exec.Command("...", ...)
      - pattern-not: exec.CommandContext($CTX, "...", ...)
    message: "Potential command injection. Ensure $CMD is not user-controlled."
    languages: [go]
    severity: WARNING
    metadata:
      category: security
      cwe: "CWE-78: OS Command Injection"

  - id: go-sql-injection
    pattern-either:
      - pattern: $DB.Query($QUERY + ...)
      - pattern: $DB.Exec($QUERY + ...)
      - pattern: $DB.QueryRow($QUERY + ...)
    message: "Potential SQL injection. Use parameterized queries instead."
    languages: [go]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-89: SQL Injection"

  - id: go-path-traversal
    patterns:
      - pattern-either:
          - pattern: os.Open($PATH)
          - pattern: os.ReadFile($PATH)
          - pattern: ioutil.ReadFile($PATH)
      # Exclude hardcoded paths (string literals are safe)
      - pattern-not: os.Open("...")
      - pattern-not: os.ReadFile("...")
      - pattern-not: ioutil.ReadFile("...")
    paths:
      exclude:
        - scripts/  # Build/scaffold scripts operate on known paths
        - test/     # Test files use controlled paths
        - internal/check/timing.go  # Uses os.UserConfigDir(), no user input
        - internal/vault/config.go  # Reads config from vault root (user-provided but intentional)
        - internal/cmdutil/helpers.go  # Reads DB file for index hash (user-provided vault path)
        - internal/index/indexer.go  # Reads vault files during indexing (user-provided vault path)
        - internal/mutation/mutator.go  # Reads/writes vault note files during mutation (user-provided vault path)
        - internal/marker/render.go  # Reads/writes vault note files and section templates (user-provided vault path)
        - internal/plan/executor.go  # Reads vault note files for backup/rollback (user-provided vault path, validated by safePath)
        - internal/template/process.go  # Reads template file from user-provided --template flag (controlled config path)
        - cmd/apply.go  # Reads user-specified plan JSON file (positional arg)
        - cmd/frontmatter_merge.go  # Reads user-specified YAML merge file (--file flag)
        - cmd/telemetry.go  # Reads config file from viper.ConfigFileUsed() path (not user input)
        - cmd/dataview_lint.go  # Reads vault .md files via paths from vault scanner (user-provided vault path)
        - internal/mutation/lint.go  # Reads/writes vault .md files via WalkDir (user-provided vault path, paths from filesystem walk)
        - internal/baseline/fixture.go  # Reads project-internal baseline fixture + snapshot paths from test callers (filepath.Clean applied, not user input at runtime)
        - internal/query/validate_live.go  # Reads vault .md files via filepath.WalkDir rooted at user-provided vault path (already #nosec G304)
    message: "Potential path traversal. Validate and sanitize file paths."
    languages: [go]
    severity: WARNING
    metadata:
      category: security
      cwe: "CWE-22: Path Traversal"

  - id: go-weak-crypto
    pattern-either:
      - pattern: md5.New()
      - pattern: md5.Sum(...)
      - pattern: sha1.New()
      - pattern: sha1.Sum(...)
      - pattern: des.NewCipher(...)
      - pattern: rc4.NewCipher(...)
    message: "Weak cryptographic algorithm. Use SHA-256 or stronger."
    languages: [go]
    severity: WARNING
    metadata:
      category: security
      cwe: "CWE-327: Use of Broken Crypto Algorithm"

  - id: go-hardcoded-secret
    pattern-regex: '(?i)(password|secret|api[_-]?key|token)\s*[:=]\s*["\x27][^"\x27]{8,}["\x27]'
    message: "Potential hardcoded secret. Use environment variables or secret management."
    languages: [go]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-798: Hardcoded Credentials"

  # === Code Quality Rules ===

  - id: go-empty-error-check
    patterns:
      - pattern: |
          if $ERR != nil {
          }
      - pattern: |
          if $ERR != nil {
              // ...
          }
    message: "Empty error handling. Log or return the error."
    languages: [go]
    severity: WARNING
    metadata:
      category: best-practice

  - id: go-defer-in-loop
    patterns:
      - pattern-inside: |
          for ... {
            ...
          }
      - pattern-not-inside: |
          go func(...) {
            ...
          }(...)
      - pattern: defer $FUNC(...)
    message: "Defer inside loop may cause resource leaks. Consider moving outside."
    languages: [go]
    severity: WARNING
    metadata:
      category: best-practice

  - id: go-context-background-in-handler
    patterns:
      - pattern-inside: |
          func $HANDLER($W http.ResponseWriter, $R *http.Request) {
            ...
          }
      - pattern: context.Background()
    message: "Use request context (r.Context()) instead of context.Background() in handlers."
    languages: [go]
    severity: WARNING
    metadata:
      category: best-practice

  # === Project-Specific Rules ===

  - id: ckeletin-no-fmt-print-in-cmd
    patterns:
      - pattern-inside: |
          func $FUNC(...) {
            ...
          }
      - pattern-either:
          - pattern: fmt.Println(...)
          - pattern: fmt.Printf(...)
          - pattern: fmt.Print(...)
      - metavariable-regex:
          metavariable: $FUNC
          regex: ^(run|execute|init)
    paths:
      include:
        - cmd/
    message: "Use structured logging (log.Info/Error) instead of fmt.Print in commands (ADR-006)."
    languages: [go]
    severity: INFO
    metadata:
      category: project-convention
      adr: ADR-006

  - id: ckeletin-no-os-exit
    pattern: os.Exit(...)
    paths:
      include:
        - internal/
    message: "Avoid os.Exit in internal packages. Return errors to let cmd layer handle exit."
    languages: [go]
    severity: WARNING
    metadata:
      category: project-convention
      adr: ADR-001

  - id: ckeletin-log-error-and-return
    patterns:
      - pattern: |
          log.Error(). ... .Msg(...)
          ...
          return ...
    paths:
      include:
        - cmd/
        - internal/
        - pkg/
      exclude:
        - "*_test.go"
        - cmd/flags.go           # Programming errors with no error return path
        - internal/ui/renderer.go # Shadow logging at error consumption boundary
    message: >
      ADR-006 violation: log.Error() followed by return. If the error is being
      returned, use log.Debug() instead. log.Error() should only be used for
      unrecoverable failures where the error cannot be propagated to the caller.
    languages: [go]
    severity: WARNING
    metadata:
      category: project-convention
      adr: ADR-006

  - id: ckeletin-no-mock-frameworks
    pattern-either:
      - pattern: |
          import "github.com/golang/mock/gomock"
      - pattern: |
          import "go.uber.org/mock/gomock"
      - pattern: |
          import "github.com/stretchr/testify/mock"
    paths:
      include:
        - cmd/
        - internal/
        - pkg/
    message: >
      ADR-003: Prefer dependency injection over mock frameworks. Use interfaces
      and test doubles instead of gomock or testify/mock.
    languages: [go]
    severity: INFO
    metadata:
      category: project-convention
      adr: ADR-003
