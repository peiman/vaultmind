# Golden queries against vaultmind-identity/.
#
# Each entry is a natural-language query I (or a future session) would plausibly
# issue, plus the note IDs that SHOULD land in the top-K. Expected sets are
# curated by a human who has read the vault — they are the ground truth the
# retriever is judged against. Keep them small (1–3 IDs) and high-confidence.
#
# Add a query when:
#   - A real session surfaced a case where retrieval was wrong (regression seed)
#   - The vault gained a note whose retrievability we want locked in
#   - A paraphrase or domain-specific phrasing exposes a weak lane
#
# Do NOT add queries just to inflate the count. Each entry is a commitment to
# keep that query's ranking from regressing.

# --- priority / roadmap — what matters now ---
- name: priority-what-matters
  text: "what matters most right now"
  expected: [reference-current-context]

- name: priority-roadmap-order
  text: "plasticity priority order"
  expected: [reference-plasticity-priority-order]

- name: priority-roadmap-paraphrase
  text: "what is the roadmap I committed to"
  expected: [reference-plasticity-priority-order, reference-current-context]

