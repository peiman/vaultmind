# Golden queries against vaultmind-vault (the research vault — 148 notes
# spanning cognitive science, memory architectures, IR, and AI memory systems).
#
# Each entry is a natural-language query a real session might issue, plus the
# note IDs that SHOULD land in the top-K. Expected sets are curated by reading
# the vault — they are the ground truth retrieval is judged against. Keep them
# small (1–3 IDs) and high-confidence.
#
# Add a query when:
#   - A real session surfaced retrieval that was wrong (regression seed)
#   - The vault gained a note whose retrievability we want locked in
#   - A paraphrase exposes a weak retrieval lane
#
# Do NOT add queries just to inflate the count. Each entry is a commitment to
# keep that query's ranking from regressing.

